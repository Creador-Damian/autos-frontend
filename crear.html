<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Vehículo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-container">
  <h2>Agregar Nuevo Vehículo</h2>

  <form id="form-auto">
    <input type="text" name="marca" placeholder="Marca" required>
    <input type="text" name="modelo" placeholder="Modelo" required>
    <input type="number" name="año" placeholder="Año" required>
    <input type="number" name="precio" placeholder="Precio" required>

    <label>Imagen del vehículo (JPEG)</label>
    <input type="file" name="imagen" accept="image/jpeg,image/jpg,image/png" required>

    <button type="submit">Guardar Vehículo</button>
  </form>

  <a href="index.html" class="volver">← Volver al catálogo</a>
</div>

<script>
document.getElementById("form-auto").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = document.getElementById("form-auto");
  const formData = new FormData(form);

  try {
    const response = await fetch("https://autos-backendss.onrender.com/autos", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if(response.ok){
      alert("Vehículo agregado correctamente 🚗🔥");
      window.location.href = "index.html";
    } else {
      alert("Error: " + data.error);
    }

  } catch(error) {
    console.error(error);
    alert("Error al subir el vehículo");
  }
});
</script>

</body>
</html>
